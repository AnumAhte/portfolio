<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:22px 26px}
.row{display:grid;gap:10px;grid-template-columns:1fr 1fr}
.swatch{border-radius:14px;padding:14px 16px;border:1px solid rgba(139,92,246,.22);
  display:flex;flex-direction:column;justify-content:space-between;min-height:88px;font-weight:700}
.hex{font-size:10px;opacity:.85;font-weight:600;letter-spacing:.04em}
.name{font-size:13px;font-weight:700}
.label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a855f7;font-weight:700;margin:0 0 8px}
</style></head><body><div class="card">
<div class="label">Surfaces — dark canon</div>
<div class="row">
  <div class="swatch" style="background:#03030a;color:#f0eeff"><span class="name">bg-primary</span><span class="hex">#03030A · near-black</span></div>
  <div class="swatch" style="background:#07070f;color:#f0eeff"><span class="name">bg-secondary</span><span class="hex">#07070F · footer</span></div>
  <div class="swatch" style="background:rgba(10,8,22,.85);color:#f0eeff;backdrop-filter:blur(8px)"><span class="name">bg-card · glass</span><span class="hex">rgba(10,8,22,0.80) + blur 24px</span></div>
  <div class="swatch" style="background:rgba(168,85,247,0.12);color:#f0eeff;border:1px solid rgba(168,85,247,.35)"><span class="name">accent tint</span><span class="hex">rgba(168,85,247,0.10–0.16)</span></div>
</div>
<div class="label" style="margin-top:14px">Surfaces — light</div>
<div class="row">
  <div class="swatch" style="background:#f5f3ff;color:#0d0b1a"><span class="name">bg-primary</span><span class="hex">#F5F3FF · lavender</span></div>
  <div class="swatch" style="background:rgba(255,255,255,.88);color:#0d0b1a;border:1px solid rgba(124,58,237,.18)"><span class="name">bg-card · glass</span><span class="hex">rgba(255,255,255,0.88)</span></div>
</div>
</div></body></html>
