<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.row:last-child{margin:0}
.lab{flex:0 0 90px;font-size:10px;color:#524e6f;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.box{border:1px dashed rgba(168,85,247,.35);background:rgba(168,85,247,.06)}
.r-sm{border-radius:8px}.r-md{border-radius:12px}.r-lg{border-radius:16px}.r-xl{border-radius:20px}.r-2xl{border-radius:24px}.r-full{border-radius:9999px}
.tag{font-size:11px;color:#9590b8}
</style></head><body><div class="card">
<div class="row"><div class="lab">8</div><div class="box r-sm" style="width:64px;height:40px"></div><span class="tag">rounded-sm · 8px — chips, small inputs</span></div>
<div class="row"><div class="lab">12</div><div class="box r-md" style="width:64px;height:40px"></div><span class="tag">rounded-xl · 12px — buttons, inputs, icon tiles</span></div>
<div class="row"><div class="lab">16</div><div class="box r-lg" style="width:64px;height:40px"></div><span class="tag">rounded-2xl · 16px — cards, modal panels</span></div>
<div class="row"><div class="lab">20</div><div class="box r-xl" style="width:64px;height:40px"></div><span class="tag">card-premium default</span></div>
<div class="row"><div class="lab">24</div><div class="box r-2xl" style="width:64px;height:40px"></div><span class="tag">rounded-3xl · featured project, contact form</span></div>
<div class="row"><div class="lab">∞</div><div class="box r-full" style="width:64px;height:40px"></div><span class="tag">rounded-full · pills, dots, avatars, orbs</span></div>
</div></body></html>
