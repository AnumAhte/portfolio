<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Card Base</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background:#03030a; color:#f0eeff;
    font-family:'Inter',sans-serif; }
  .card {
    width: 700px; box-sizing: border-box;
    padding: 24px 28px;
    background:
      radial-gradient(at 20% 10%, rgba(124,58,237,0.18) 0, transparent 55%),
      radial-gradient(at 90% 90%, rgba(168,85,247,0.14) 0, transparent 55%),
      #03030a;
  }
  .row { display:flex; gap:14px; align-items:center; flex-wrap: wrap; }
  .grid { display:grid; gap:12px; }
  .swatch {
    border-radius: 14px; padding: 14px;
    border: 1px solid rgba(139,92,246,0.22);
    color:#fff; font-weight: 700;
    font-family:'Inter',sans-serif;
    display:flex; flex-direction:column; justify-content:space-between;
    min-height: 88px;
  }
  .swatch .hex { font-size:11px; opacity:.85; font-weight:600; letter-spacing:.04em; }
  .swatch .name { font-size:13px; font-weight:700; }
  .label { font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:#a855f7; font-weight:700; margin-bottom:8px; }
</style>
</head>
<body>
<div class="card"><!-- override per file --></div>
</body>
</html>
