<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif;padding:0}
.card{width:700px;box-sizing:border-box;padding:24px 28px;
  background:radial-gradient(at 30% 15%,rgba(109,40,217,.30) 0,transparent 55%),radial-gradient(at 90% 60%,rgba(109,40,217,.18) 0,transparent 52%),#03030a}
.demo{font-family:'Poppins',sans-serif;font-size:48px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.gt{background:linear-gradient(135deg,#d8b4fe 0%,#a855f7 42%,#e879f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.line{display:inline-block;position:relative}
.line::after{content:'';position:absolute;bottom:-6px;left:0;width:100%;height:3px;
  background:linear-gradient(90deg,#7c3aed,#a855f7,#e879f9,#c084fc);border-radius:2px}
.eyebrow{font-size:12px;color:#a855f7;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;display:block}
.caption{font-size:11px;color:#524e6f;margin-top:18px;font-family:'Inter',sans-serif}
</style></head><body><div class="card">
<span class="eyebrow">Get to know me</span>
<div class="demo">About <span class="gt line">Me</span></div>
<div class="caption">SECTION-TITLE PATTERN ▸ second word: gradient-clipped + 4-stop gradient underline (3px, rounded). Eyebrow above.</div>
</div></body></html>
