<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px;display:flex;align-items:center;gap:32px}
.wrap{display:flex;align-items:center;gap:14px}
.logo{width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,#a855f7,#7c3aed);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
  font-family:'Poppins',sans-serif;font-size:22px;letter-spacing:-1px;
  box-shadow:0 0 20px rgba(168,85,247,.5)}
.wm{font-family:'Poppins',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.025em}
.wm .gt{background:linear-gradient(135deg,#d8b4fe 0%,#a855f7 42%,#e879f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.av{width:128px;height:128px;border-radius:50%;
  background:radial-gradient(at 35% 30%,rgba(255,255,255,.45),transparent 50%),
             linear-gradient(135deg,#a855f7 0%,#7c3aed 55%,#5b21b6 100%);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;
  font-family:'Poppins',sans-serif;font-size:48px;letter-spacing:-2px;
  box-shadow:0 0 40px rgba(168,85,247,.4)}
.lab{font-size:11px;color:#524e6f;text-transform:uppercase;letter-spacing:.16em;margin-top:8px;font-weight:700}
</style></head><body><div class="card">
<div>
  <div class="wrap"><div class="logo">AA</div><div class="wm"><span class="gt">Anum</span><span style="color:#524e6f">.</span></div></div>
  <div class="lab">Logo mark + wordmark</div>
</div>
<div>
  <div class="av">AA</div>
  <div class="lab" style="text-align:center">Hero avatar</div>
</div>
</div></body></html>
