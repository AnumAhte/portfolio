<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px}
.field{display:block;margin-bottom:12px}
.field label{display:block;font-size:11px;color:#524e6f;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;font-weight:700}
.input{width:100%;padding:12px 16px;border-radius:12px;
  background:rgba(10,8,22,.6);backdrop-filter:blur(24px);
  border:1px solid rgba(139,92,246,.22);color:#f0eeff;font-size:15px;outline:none;
  font-family:'Inter',sans-serif;box-sizing:border-box}
.input.focus{border-color:rgba(168,85,247,.7);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
textarea.input{resize:none;height:60px}
</style></head><body><div class="card">
<div class="field"><label>Default</label>
  <input class="input" placeholder="Your Name"/></div>
<div class="field"><label>Focused</label>
  <input class="input focus" value="anum@example.com"/></div>
<div class="field"><label>Textarea</label>
  <textarea class="input" placeholder="Message"></textarea></div>
</div></body></html>
