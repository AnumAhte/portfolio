<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">

<div class="row"><div class="meta"><b>H3</b><br/>Poppins 700 · 32px</div>

<div class="row"><div class="meta"><b>H4</b><br/>Poppins 700 · 18px</div>

</div></body></html>
