<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:28px 28px;
  background:radial-gradient(at 30% 15%,rgba(109,40,217,.30) 0,transparent 55%),radial-gradient(at 90% 85%,rgba(124,58,237,.22) 0,transparent 55%),#03030a}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
  background:linear-gradient(135deg,#6d28d9,#7c3aed,#9333ea,#a855f7);background-size:200% 200%;
  color:#fff;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;border-radius:14px;
  border:none;box-shadow:0 4px 20px rgba(139,92,246,.40),0 0 0 1px rgba(168,85,247,.25);cursor:pointer}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
  background:rgba(10,8,22,.60);color:#f0eeff;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:15px;border-radius:14px;border:1px solid rgba(139,92,246,.22);
  backdrop-filter:blur(12px);cursor:pointer}
.btn-cta{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  background:linear-gradient(90deg,#9333ea,#7c3aed);color:#fff;font-family:'Poppins',sans-serif;
  font-weight:600;font-size:13px;border-radius:12px;border:none;box-shadow:0 0 12px rgba(168,85,247,.3)}
.dot{width:6px;height:6px;border-radius:50%;background:#34d399}
</style></head><body><div class="card">
<div class="row">
  <button class="btn-primary">View Projects →</button>
  <button class="btn-ghost">Hire Me</button>
  <button class="btn-cta"><span class="dot"></span>Hire Me</button>
</div>
</div></body></html>
