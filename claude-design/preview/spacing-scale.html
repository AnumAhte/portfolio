<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px}
.row{display:flex;align-items:center;gap:14px;margin-bottom:12px;font-size:12px;color:#9590b8}
.bar{height:14px;border-radius:7px;background:linear-gradient(90deg,rgba(168,85,247,.85),rgba(168,85,247,.15));}
.tag{flex:0 0 80px;color:#a855f7;font-weight:700;font-family:ui-monospace,monospace;font-size:11px}
.val{flex:0 0 70px;color:#524e6f;font-size:11px}
</style></head><body><div class="card">
<div class="row"><span class="tag">--space-1</span><span class="val">4px</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="tag">--space-2</span><span class="val">8px</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="tag">--space-3</span><span class="val">12px</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="tag">--space-4</span><span class="val">16px</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="tag">--space-6</span><span class="val">24px</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="tag">--space-8</span><span class="val">32px</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="tag">--space-12</span><span class="val">48px</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="tag">section</span><span class="val">112px</span><div class="bar" style="width:112px"></div></div>
</div></body></html>
