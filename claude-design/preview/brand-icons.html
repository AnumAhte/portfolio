<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.tile{width:42px;height:42px;border-radius:12px;background:rgba(10,8,22,.8);
  border:1px solid rgba(139,92,246,.22);display:flex;align-items:center;justify-content:center;color:#c084fc}
.lab{font-size:9px;color:#524e6f;text-align:center;letter-spacing:.04em}
.eyebrow{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a855f7;font-weight:700;margin:0 0 12px}
</style></head><body><div class="card">
<p class="eyebrow">Lucide icons · 22px · stroke 2 · text-purple-400</p>
<div class="grid">
  <div class="cell"><div class="tile"><i data-lucide="brain"></i></div><div class="lab">brain</div></div>
  <div class="cell"><div class="tile"><i data-lucide="rocket"></i></div><div class="lab">rocket</div></div>
  <div class="cell"><div class="tile"><i data-lucide="code-2"></i></div><div class="lab">code-2</div></div>
  <div class="cell"><div class="tile"><i data-lucide="lightbulb"></i></div><div class="lab">lightbulb</div></div>
  <div class="cell"><div class="tile"><i data-lucide="sparkles"></i></div><div class="lab">sparkles</div></div>
  <div class="cell"><div class="tile"><i data-lucide="zap"></i></div><div class="lab">zap</div></div>
  <div class="cell"><div class="tile"><i data-lucide="star"></i></div><div class="lab">star</div></div>
  <div class="cell"><div class="tile"><i data-lucide="bot"></i></div><div class="lab">bot</div></div>
  <div class="cell"><div class="tile"><i data-lucide="globe"></i></div><div class="lab">globe</div></div>
  <div class="cell"><div class="tile"><i data-lucide="layers"></i></div><div class="lab">layers</div></div>
  <div class="cell"><div class="tile"><i data-lucide="server"></i></div><div class="lab">server</div></div>
  <div class="cell"><div class="tile"><i data-lucide="palette"></i></div><div class="lab">palette</div></div>
  <div class="cell"><div class="tile"><i data-lucide="container"></i></div><div class="lab">container</div></div>
  <div class="cell"><div class="tile"><i data-lucide="mail"></i></div><div class="lab">mail</div></div>
  <div class="cell"><div class="tile"><i data-lucide="map-pin"></i></div><div class="lab">map-pin</div></div>
  <div class="cell"><div class="tile"><i data-lucide="message-square"></i></div><div class="lab">msg-square</div></div>
  <div class="cell"><div class="tile"><i data-lucide="moon"></i></div><div class="lab">moon</div></div>
  <div class="cell"><div class="tile"><i data-lucide="sun"></i></div><div class="lab">sun</div></div>
  <div class="cell"><div class="tile"><i data-lucide="menu"></i></div><div class="lab">menu</div></div>
  <div class="cell"><div class="tile"><i data-lucide="external-link"></i></div><div class="lab">extlink</div></div>
  <div class="cell"><div class="tile"><i data-lucide="arrow-up-right"></i></div><div class="lab">arrow-ur</div></div>
  <div class="cell"><div class="tile"><i data-lucide="check-circle"></i></div><div class="lab">check</div></div>
  <div class="cell"><div class="tile"><i data-lucide="book-open"></i></div><div class="lab">book-open</div></div>
  <div class="cell"><div class="tile"><i data-lucide="heart"></i></div><div class="lab">heart</div></div>
</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
