<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:24px 28px;
  background:radial-gradient(at 20% 10%,rgba(124,58,237,.18) 0,transparent 55%),#03030a}
.row{display:flex;gap:10px;flex-wrap:wrap}
.pill{padding:8px 16px;border-radius:9999px;font-size:13px;font-weight:500;
  background:rgba(10,8,22,.80);backdrop-filter:blur(12px);
  border:1px solid rgba(139,92,246,.22);color:#9590b8}
.pill.tech{padding:6px 12px;border-radius:10px;font-size:13px;font-weight:600;color:#9590b8}
.pill.expert{background:rgba(168,85,247,.16);color:#d8b4fe;border:1px solid rgba(168,85,247,.35);padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:700}
.pill.advanced{background:rgba(124,58,237,.16);color:#c4b5fd;border:1px solid rgba(124,58,237,.35);padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:700}
.pill.intermediate{background:rgba(99,102,241,.14);color:#a5b4fc;border:1px solid rgba(99,102,241,.28);padding:4px 12px;border-radius:9999px;font-size:11px;font-weight:700}
.pill.featured{background:linear-gradient(90deg,#fbbf24,#f97316);color:#fff;padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;border:none}
.pill.avail{padding:8px 16px;font-size:13px}
.pill.avail .d{display:inline-block;width:8px;height:8px;border-radius:50%;background:#34d399;margin-right:8px;vertical-align:middle}
.lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#a855f7;font-weight:700;margin:0 0 8px}
</style></head><body><div class="card">
<p class="lab">Trait & tech pills</p>
<div class="row">
  <span class="pill">🎯 Goal-Oriented</span>
  <span class="pill">⚡ Fast Learner</span>
  <span class="pill tech">Next.js</span>
  <span class="pill tech">TypeScript</span>
  <span class="pill tech">RAG</span>
</div>
<p class="lab" style="margin-top:14px">Skill level badges</p>
<div class="row">
  <span class="pill expert">EXPERT</span>
  <span class="pill advanced">ADVANCED</span>
  <span class="pill intermediate">INTERMEDIATE</span>
  <span class="pill featured">★ FEATURED</span>
  <span class="pill avail"><span class="d"></span>Available for opportunities</span>
</div>
</div></body></html>
