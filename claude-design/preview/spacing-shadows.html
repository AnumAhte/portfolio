<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#03030a;color:#f0eeff;font-family:'Inter',sans-serif}
.card{width:700px;box-sizing:border-box;padding:32px 28px}
.row{display:flex;gap:32px;justify-content:space-around;align-items:center}
.box{width:120px;height:80px;border-radius:14px;background:rgba(10,8,22,.85);
  border:1px solid rgba(139,92,246,.22);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#9590b8;font-weight:600;text-align:center;padding:8px}
.s1{box-shadow:0 4px 6px -1px rgba(0,0,0,.55),0 2px 4px -2px rgba(0,0,0,.40)}
.s2{box-shadow:0 10px 15px -3px rgba(0,0,0,.65),0 4px 6px -4px rgba(0,0,0,.45)}
.s3{box-shadow:0 0 0 1px rgba(168,85,247,.40),0 20px 48px rgba(168,85,247,.20),0 8px 20px rgba(0,0,0,.45)}
.s4{box-shadow:0 0 25px rgba(168,85,247,.45),0 0 60px rgba(168,85,247,.18),0 0 90px rgba(168,85,247,.06)}
.lab{font-size:10px;color:#524e6f;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  text-align:center;margin-top:10px}
.col{display:flex;flex-direction:column;align-items:center}
</style></head><body><div class="card">
<div class="row">
  <div class="col"><div class="box s1">shadow</div><div class="lab">base</div></div>
  <div class="col"><div class="box s2">shadow-lg</div><div class="lab">lifted</div></div>
  <div class="col"><div class="box s3">card-hover</div><div class="lab">hover · purple</div></div>
  <div class="col"><div class="box s4">glow-purple</div><div class="lab">3-tier glow</div></div>
</div>
</div></body></html>
